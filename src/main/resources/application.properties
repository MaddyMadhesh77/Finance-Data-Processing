# Application Configuration
spring.application.name=finance-backend

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (accessible at /h2-console for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server port
server.port=8080

# Logging
logging.level.com.zorvyn=INFO
logging.level.org.springframework.security=WARN

# JWT auth
finance.security.jwt.secret=${JWT_SECRET:change-this-default-secret-key-at-least-32-chars}
finance.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# Rate limiting
finance.security.rate-limit.api-per-minute=${RATE_LIMIT_API_PER_MINUTE:500}
finance.security.rate-limit.auth-per-minute=${RATE_LIMIT_AUTH_PER_MINUTE:20}
