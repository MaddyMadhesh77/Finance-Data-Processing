# PostgreSQL profile for production-like deployments

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/finance}
spring.datasource.username=${DB_USERNAME:finance}
spring.datasource.password=${DB_PASSWORD:finance}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

# Use the same security tuning as the default profile; override via env vars if needed.
finance.security.jwt.secret=${JWT_SECRET:change-this-default-secret-key-at-least-32-chars}
finance.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
finance.security.rate-limit.api-per-minute=${RATE_LIMIT_API_PER_MINUTE:500}
finance.security.rate-limit.auth-per-minute=${RATE_LIMIT_AUTH_PER_MINUTE:20}